<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Intentions</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #e8e6e0;
    --muted: #6b6966;
    --accent: #4a9eff;
    --accent-dim: #1a3a5c;
    --frog: #3d8c5a;
    --frog-dim: #1a3329;
    --danger: #c0392b;
    --radius: 8px;
    --mono: 'SF Mono', 'Fira Mono', 'Cascadia Code', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f3ef;
      --surface: #ffffff;
      --surface2: #f0efeb;
      --border: #dddbd5;
      --border2: #c8c6c0;
      --text: #1a1a18;
      --muted: #8a8880;
      --accent: #1a6fd4;
      --accent-dim: #ddeeff;
      --frog: #2d7a4a;
      --frog-dim: #d4ede0;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  .app {
    max-width: 560px;
    margin: 0 auto;
    padding: 1.5rem 1rem 4rem;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .app-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.04em;
    font-family: var(--mono);
  }
  .export-btn {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 5px 11px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.75; }
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .add-input {
    flex: 1;
    height: 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 0 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--muted); }
  .add-btn {
    height: 42px;
    padding: 0 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: var(--sans);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.85; }
  .bucket { margin-bottom: 1.25rem; }
  .bucket-label {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    padding-left: 2px;
  }
  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 4px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .task-card:hover { border-color: var(--border2); }
  .task-card.expanded { border-color: var(--accent); }
  .task-card.is-frog { border-color: var(--frog); }
  .task-card.is-frog.expanded { border-color: var(--frog); }
  .task-main {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 11px 13px;
    cursor: pointer;
    user-select: none;
  }
  .check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .check:hover { border-color: var(--accent); }
  .check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .check.checked::after {
    content: '';
    width: 4px;
    height: 8px;
    border: 1.5px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }
  .task-body { flex: 1; min-width: 0; }
  .task-title {
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    word-break: break-word;
  }
  .task-card.done .task-title {
    color: var(--muted);
    text-decoration: line-through;
  }
  .task-chips {
    display: flex;
    gap: 5px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    background: none;
    transition: all 0.1s;
  }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.later-on {
    color: var(--accent);
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .chip.frog-on {
    color: var(--frog);
    border-color: var(--frog);
    background: var(--frog-dim);
  }
  .expand-arrow {
    color: var(--muted);
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 3px;
    transition: transform 0.15s;
  }
  .expanded .expand-arrow { transform: rotate(180deg); }
  .intention-panel {
    padding: 0 13px 13px;
    border-top: 1px solid var(--border);
    display: none;
  }
  .expanded .intention-panel { display: block; }
  .int-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }
  .int-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .int-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    width: 76px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .int-input {
    flex: 1;
    font-size: 13px;
    font-family: var(--sans);
    color: var(--text);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 3px 0;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  .int-input:focus { border-color: var(--accent); }
  .int-input::placeholder { color: var(--muted); font-size: 12px; }
  .task-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 12px;
  }
  .del-btn {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--danger);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    opacity: 0.7;
  }
  .del-btn:hover { opacity: 1; }
  .completed-toggle {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 8px 2px;
    letter-spacing: 0.04em;
  }
  .completed-toggle:hover { color: var(--text); }
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 9px 18px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
    padding: 2rem 0;
  }
  @media (max-width: 480px) {
    .app { padding: 1rem 0.75rem 4rem; }
    .add-input { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <span class="app-title">⚓ intentions</span>
    <button class="export-btn" onclick="exportMd()">copy as markdown</button>
  </div>
  <div class="add-row">
    <input id="new-task" class="add-input" type="text" placeholder="Add a task…" autocomplete="off" onkeydown="if(event.key==='Enter')addTask()">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>
  <div id="frog-bucket" class="bucket"></div>
  <div id="today-bucket" class="bucket"></div>
  <div id="later-bucket" class="bucket"></div>
  <div id="completed-section"></div>
</div>
<div class="toast" id="toast">Copied to clipboard</div>

<script>
const KEY = 'intentions-v1';
let tasks = [];
let showDone = false;

function load() {
  try { tasks = JSON.parse(localStorage.getItem(KEY)) || []; } catch { tasks = []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(tasks));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

function addTask() {
  const inp = document.getElementById('new-task');
  const title = inp.value.trim();
  if (!title) return;
  tasks.unshift({
    id: uid(), title, due: 'today',
    frog: false, done: false, expanded: false,
    intention: { action: '', when: '', where: '', obstacle: '', backup: '' }
  });
  inp.value = '';
  save(); render();
}

function toggleDone(id, e) {
  e && e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.done = !t.done;
  t.expanded = false;
  save(); render();
}
function toggleFrog(id, e) {
  e && e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.frog = !t.frog;
  save(); render();
}
function toggleLater(id, e) {
  e && e.stopPropagation();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.due = t.due === 'later' ? 'today' : 'later';
  save(); render();
}
function toggleExpand(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.expanded = !t.expanded;
  save(); render();
}
function deleteTask(id, e) {
  e && e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}
function updateField(id, field, val) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.intention[field] = val; save(); }
}

function makeCard(t) {
  const int = t.intention || {};
  const fields = [
    ['action',   'First action', 'The literal first thing to do…'],
    ['when',     'When',         'After breakfast, at 10am…'],
    ['where',    'Where',        'Desk, phone, app…'],
    ['obstacle', 'Obstacle',     'What might block this?'],
    ['backup',   'Backup',       'If that happens, I will…'],
  ];

  const card = document.createElement('div');
  card.className = `task-card${t.done?' done':''}${t.expanded?' expanded':''}${t.frog&&!t.done?' is-frog':''}`;
  card.onclick = () => !t.done && toggleExpand(t.id);

  const main = document.createElement('div');
  main.className = 'task-main';

  const check = document.createElement('div');
  check.className = `check${t.done?' checked':''}`;
  check.onclick = e => toggleDone(t.id, e);
  main.appendChild(check);

  const body = document.createElement('div');
  body.className = 'task-body';

  const titleEl = document.createElement('div');
  titleEl.className = 'task-title';
  titleEl.textContent = t.title;
  body.appendChild(titleEl);

  if (!t.done) {
    const chips = document.createElement('div');
    chips.className = 'task-chips';

    const laterChip = document.createElement('button');
    laterChip.className = `chip${t.due==='later'?' later-on':''}`;
    laterChip.textContent = t.due === 'later' ? 'later' : 'today';
    laterChip.onclick = e => toggleLater(t.id, e);
    chips.appendChild(laterChip);

    const frogChip = document.createElement('button');
    frogChip.className = `chip${t.frog?' frog-on':''}`;
    frogChip.textContent = t.frog ? '🐸 frog' : 'frog';
    frogChip.onclick = e => toggleFrog(t.id, e);
    chips.appendChild(frogChip);

    body.appendChild(chips);
  }
  main.appendChild(body);

  if (!t.done) {
    const arrow = document.createElement('span');
    arrow.className = 'expand-arrow';
    arrow.textContent = '▾';
    main.appendChild(arrow);
  }
  card.appendChild(main);

  if (!t.done) {
    const panel = document.createElement('div');
    panel.className = 'intention-panel';

    const grid = document.createElement('div');
    grid.className = 'int-grid';

    fields.forEach(([f, label, ph]) => {
      const row = document.createElement('div');
      row.className = 'int-row';
      const lbl = document.createElement('span');
      lbl.className = 'int-label';
      lbl.textContent = label;
      const inp = document.createElement('input');
      inp.className = 'int-input';
      inp.type = 'text';
      inp.placeholder = ph;
      inp.value = int[f] || '';
      inp.onclick = e => e.stopPropagation();
      inp.oninput = e => updateField(t.id, f, e.target.value);
      row.appendChild(lbl);
      row.appendChild(inp);
      grid.appendChild(row);
    });
    panel.appendChild(grid);

    const actions = document.createElement('div');
    actions.className = 'task-actions';
    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = 'delete';
    del.onclick = e => deleteTask(t.id, e);
    actions.appendChild(del);
    panel.appendChild(actions);
    card.appendChild(panel);
  }

  return card;
}

function render() {
  const open = tasks.filter(t => !t.done);
  const frogs = open.filter(t => t.frog);
  const today = open.filter(t => !t.frog && t.due === 'today');
  const later = open.filter(t => !t.frog && t.due === 'later');
  const done  = tasks.filter(t => t.done);

  const frogEl = document.getElementById('frog-bucket');
  const todayEl = document.getElementById('today-bucket');
  const laterEl = document.getElementById('later-bucket');
  const compEl  = document.getElementById('completed-section');

  frogEl.innerHTML = '';
  todayEl.innerHTML = '';
  laterEl.innerHTML = '';
  compEl.innerHTML = '';

  if (frogs.length) {
    const lbl = document.createElement('div');
    lbl.className = 'bucket-label';
    lbl.textContent = '🐸 Frog — do this first';
    frogEl.appendChild(lbl);
    frogs.forEach(t => frogEl.appendChild(makeCard(t)));
  }

  if (today.length) {
    const lbl = document.createElement('div');
    lbl.className = 'bucket-label';
    lbl.textContent = 'Today';
    todayEl.appendChild(lbl);
    today.forEach(t => todayEl.appendChild(makeCard(t)));
  }

  if (!frogs.length && !today.length) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No tasks yet — add one above';
    todayEl.appendChild(empty);
  }

  if (later.length) {
    const lbl = document.createElement('div');
    lbl.className = 'bucket-label';
    lbl.textContent = 'Later';
    laterEl.appendChild(lbl);
    later.forEach(t => laterEl.appendChild(makeCard(t)));
  }

  if (done.length) {
    const tog = document.createElement('button');
    tog.className = 'completed-toggle';
    tog.innerHTML = `${showDone ? '▾' : '▸'} completed (${done.length})`;
    tog.onclick = () => { showDone = !showDone; render(); };
    compEl.appendChild(tog);
    if (showDone) done.forEach(t => compEl.appendChild(makeCard(t)));
  }
}

function fmtTask(t) {
  const int = t.intention || {};
  let md = `- [ ] ${t.title}`;
  if (int.action)   md += `\n  - First action: ${int.action}`;
  if (int.when)     md += `\n  - When: ${int.when}`;
  if (int.where)    md += `\n  - Where: ${int.where}`;
  if (int.obstacle) md += `\n  - Obstacle: ${int.obstacle}`;
  if (int.backup)   md += `\n  - Backup: ${int.backup}`;
  return md;
}

function exportMd() {
  const date = new Date().toISOString().slice(0, 10);
  const open  = tasks.filter(t => !t.done);
  const frogs = open.filter(t => t.frog);
  const today = open.filter(t => !t.frog && t.due === 'today');
  const later = open.filter(t => t.due === 'later');

  let md = `# ⚓ Daily Focus — ${date}\n\n`;
  md += `**Energy:**   **Constraint:**\n\n---\n\n`;

  if (frogs.length) {
    const f = frogs[0];
    const int = f.intention || {};
    md += `## 🐸 Frog\n\n`;
    md += `**Task:** ${f.title}\n`;
    md += `**Done when:** \n`;
    md += `**First action:** ${int.action || ''}\n`;
    if (int.when)  md += `**When:** ${int.when}\n`;
    if (int.where) md += `**Where:** ${int.where}\n`;
    md += `\n*I only need 5 minutes. I'm allowed to do this badly.*\n\n---\n\n`;
  }

  md += `## Today's three\n\n`;
  const allToday = [...frogs, ...today].slice(0, 3);
  allToday.forEach((t, i) => {
    const int = t.intention || {};
    md += `${i + 1}. ${t.title}`;
    if (int.when || int.where) md += ` _(${[int.when, int.where].filter(Boolean).join(', ')})_`;
    md += '\n';
  });

  if (later.length) {
    md += `\n---\n\n## Later\n\n`;
    later.forEach(t => { md += `- [ ] ${t.title}\n`; });
  }

  md += `\n---\n\n## Notes\n\n`;

  navigator.clipboard.writeText(md.trim()).then(() => {
    const el = document.getElementById('toast');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }).catch(() => {
    prompt('Copy this:', md.trim());
  });
}

load();
render();
</script>
</body>
</html>
